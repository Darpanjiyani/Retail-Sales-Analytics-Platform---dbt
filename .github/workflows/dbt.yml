name: dbt CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # 🔹 DEV JOB (Validation)
  dbt-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dbt
        run: |
          pip install dbt-databricks

      - name: Install dependencies
        run: |
          dbt deps

      - name: Set DBT profiles directory
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml ~/.dbt/profiles.yml

      - name: Run dbt models (DEV)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          dbt run --target dev

      - name: Run dbt tests (DEV)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          dbt test --target dev


  # 🔹 PROD JOB (Deployment)
  dbt-prod:
    needs: dbt-dev   # 👈 runs only if DEV succeeds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dbt
        run: |
          pip install dbt-databricks

      - name: Install dependencies
        run: |
          dbt deps

      - name: Set DBT profiles directory
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml ~/.dbt/profiles.yml

      - name: Run dbt models (PROD)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          dbt run --target prod

      - name: Run dbt tests (PROD)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          dbt test --target prod
